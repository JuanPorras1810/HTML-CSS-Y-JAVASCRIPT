<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReservaRest - Iniciar Sesión</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/storage.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/modules.js" defer></script>
  <script src="js/app.js" defer></script>
</head>

<body>
  <div class="login-container" id="loginView">
    <div class="login-card">
      <div class="login-header">
        <h1>ReservaRest</h1>
        <p>Sistema integral de gestión</p>
      </div>
      <form id="loginForm" onsubmit="iniciarSesion(event)">
        <div class="form-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario" autocomplete="off" required />
          <span id="errorUsuario" class="error-msg"></span>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="off" required />
          <span id="errorPassword" class="error-msg"></span>
        </div>

        <button type="submit" class="btn-login">Ingresar</button>
      </form>
    </div>
  </div>
</body>

</html>
