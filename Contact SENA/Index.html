<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../CSS/style.css">
</head>
<body id="body-login">
    <div class="login-card">
        <div class="logo-container">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12v7c0 1.1.9 2 2 2h3v-8H4v-1c0-4.41 3.59-8 8-8s8 3.59 8 8v1h-3v8h3c1.1 0 2-.9 2-2v-7c0-5.52-4.42-10-10-10z"/>
            </svg>
        </div>
        <h1><span class="title-contact">Contact</span> <span class="title-sena">SENA</span></h1>
        <div class="subtitle">Plataforma para gestiones de contact center</div>

        <!-- Pestañas Selectoras Corregidas -->
        <div class="tab-system">
            <label class="tab-label">
                <input type="radio" id="radio-supervisor" name="user-type" checked>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.4 0 2.5 1.1 2.5 2.5S13.4 12 12 12s-2.5-1.1-2.5-2.5S10.6 7 12 7zm0 13c-2.7 0-5.15-1.57-6.28-4 .03-2.07 4.19-3.2 6.28-3.2 2.08 0 6.25 1.13 6.28 3.2-1.13 2.43-3.58 4-6.28 4z"/></svg>
                Supervisor
            </label>
            <label class="tab-label">
                <input type="radio" id="radio-agente" name="user-type">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                Agente
            </label>
        </div>

        <!-- Formulario -->
        <form class="form-container" action="#" method="POST">
            <div class="input-group">
                <label>
                    <span>Usuario</span>
                </label>
                <div class="input-img">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <input type="text" placeholder="Ej. 1098765432" required>
                </div>
            </div>
            <div class="input-group">
                <label>
                    <span >Contraseña</span>
                </label>
                <div class="input-img">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                    <input type="password" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn-submit">
                Iniciar Sesión
            </button>
        </form>
        <div class="footer-text">
           <span class="text-contact"> ¿Olvidaste la contraseña?</span>
        </div>
    </div>
</body>
</html>
